<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LongRun | 2026 상반기 로드맵</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />

  
  
  
  
  
<style>
:root {
	--font-heading: "Space Grotesk", system-ui, -apple-system, sans-serif;
	--font-body: "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;

	/* Core palette */
	--dark: #0a0e1a;
	--dark-2: #111827;
	--dark-3: #1c2436;
	--light: #f8f9fa;
	--white: #ffffff;
	--text: #0a0e1a;
	--muted: #6b7280;
	--muted-light: #9ca3af;
	--border: rgba(255, 255, 255, 0.08);
	--border-light: #e5e7eb;

	/* Accent */
	--indigo: #4f46e5;
	--indigo-light: #818cf8;
	--gold: #ffb703;
	--gold-dim: #f59e0b;

	/* Phase colors */
	--p1-color: #4f46e5;
	--p1-light: rgba(79, 70, 229, 0.15);
	--p2-color: #0ea5e9;
	--p2-light: rgba(14, 165, 233, 0.15);
	--p3-color: #10b981;
	--p3-light: rgba(16, 185, 129, 0.15);

	/* Status colors */
	--status-done: #4f46e5;
	--status-prog: #0ea5e9;
	--status-pend: #6b7280;
	--status-del: #ef4444;

	--radius-sm: 8px;
	--radius-md: 16px;
	--radius-lg: 24px;
	--radius-full: 999px;

	--shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.08);
	--shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.08);
	--shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.16), 0 4px 12px rgba(0, 0, 0, 0.1);
	--shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.22), 0 8px 24px rgba(0, 0, 0, 0.14);
}

/* RESET & BASE — variables are in variables.css */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================================

SCROLL PROGRESS BAR
       ============================================================ */
    #scroll-progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--indigo), var(--gold));
      width: 0%;
      z-index: 9999;
      transition: width 0.08s linear;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 72px;
      display: flex;
      align-items: center;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s ease;
    }
    .header-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--indigo), var(--indigo-light));
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 18px; height: 18px; fill: #fff; }
    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-pill {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      border: 1px solid transparent;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      cursor: pointer;
      background: none;
    }
    .nav-pill:hover {
      color: var(--white);
      border-color: var(--border);
      background: rgba(255,255,255,0.06);
    }
    .nav-pill--active {
      color: var(--gold);
      background: rgba(255,183,3,0.12);
      border-color: rgba(255,183,3,0.4);
    }

    /* ============================================================
       HERO SECTION
       ============================================================ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 40px 80px;
      text-align: center;
      overflow: hidden;
      background: var(--dark);
    }

    /* Decorative orbs */
    .hero-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .hero-orb--1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(79,70,229,0.25) 0%, transparent 70%);
      top: -100px; left: -200px;
      animation: floatOrb 8s ease-in-out infinite;
    }
    .hero-orb--2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,183,3,0.15) 0%, transparent 70%);
      bottom: -100px; right: -150px;
      animation: floatOrb 10s ease-in-out infinite reverse;
    }
    .hero-orb--3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(14,165,233,0.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: floatOrb 12s ease-in-out infinite 2s;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(20px, -30px); }
      66%       { transform: translate(-15px, 20px); }
    }

    /* Grid overlay */
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      width: 100%;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      padding: 8px 16px;
      border: 1px solid rgba(255,183,3,0.3);
      border-radius: var(--radius-full);
      background: rgba(255,183,3,0.08);
    }
    .hero-eyebrow-dot {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--white);
      margin-bottom: 24px;
      word-break: keep-all;
    }
    .hero-title-accent {
      background: linear-gradient(135deg, var(--indigo-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-family: var(--font-body);
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-bottom: 48px;
      line-height: 1.7;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.35);
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 2;
    }
    .scroll-arrow {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.4));
      animation: scrollArrow 1.8s ease-in-out infinite;
      position: relative;
    }
    .scroll-arrow::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 5px;
      border-right: 1px solid rgba(255,255,255,0.5);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      transform: translateX(-50%) rotate(45deg);
    }
    @keyframes scrollArrow {
      0%, 100% { opacity: 0; transform: scaleY(0); transform-origin: top; }
      50%       { opacity: 1; transform: scaleY(1); transform-origin: top; }
    }

    /* ============================================================
       TIMELINE SECTION (CENTER-AXIS)
       ============================================================ */
    .timeline-section {
      background: var(--dark);
      padding: 0 0 160px;
      position: relative;
    }

    /* Phase block */
    .phase-block {
      position: relative;
      padding: 120px 40px;
    }
    .phase-block--light {
      background: var(--light);
      color: var(--text);
    }
    .phase-block--dark {
      background: var(--dark);
      color: var(--white);
    }
    .phase-block--mid {
      background: var(--dark-2);
      color: var(--white);
    }
    .phase-block--deep {
      background: var(--dark-3);
      color: var(--white);
    }

    /* Phase background patterns */
    .phase-block--dark::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,70,229,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,70,229,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .phase-block--mid::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(14,165,233,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    .phase-block--deep::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      background-position: center center;
      pointer-events: none;
    }

    /* Phase transition gradient overlays */
    .phase-block--dark::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--dark-2));
      pointer-events: none;
      z-index: 1;
    }
    .phase-block--mid::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--dark-3));
      pointer-events: none;
      z-index: 1;
    }

    .phase-block-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* Phase header */
    .phase-header {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 80px;
    }
    .phase-num {
      flex-shrink: 0;
      width: 56px; height: 56px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--white);
    }
    .phase-num--1 { background: linear-gradient(135deg, #4338CA, #6366F1); }
    .phase-num--2 { background: linear-gradient(135deg, #0369A1, #0EA5E9); }
    .phase-num--3 { background: linear-gradient(135deg, #047857, #10B981); }

    .phase-meta { flex: 1; }
    .phase-tag-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .phase-month-tag {
      font-family: var(--font-heading);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      border: 1px solid;
    }
    .phase-month-tag--1 {
      color: var(--p1-color);
      border-color: rgba(79,70,229,0.35);
      background: rgba(79,70,229,0.1);
    }
    .phase-month-tag--2 {
      color: var(--p2-color);
      border-color: rgba(14,165,233,0.35);
      background: rgba(14,165,233,0.1);
    }
    .phase-month-tag--3 {
      color: var(--p3-color);
      border-color: rgba(16,185,129,0.35);
      background: rgba(16,185,129,0.1);
    }

    /* For light background phase */
    .phase-block--light .phase-month-tag--3 {
      color: #047857;
      border-color: rgba(4,120,87,0.35);
      background: rgba(4,120,87,0.08);
    }

    .phase-progress-line {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8125rem;
      color: var(--muted-light);
    }
    .phase-block--light .phase-progress-line { color: var(--muted); }

    .phase-prog-track {
      width: 80px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .phase-block--light .phase-prog-track { background: var(--border-light); }
    .phase-prog-fill { height: 100%; border-radius: var(--radius-full); }
    .phase-prog-fill--1 { background: var(--p1-color); }
    .phase-prog-fill--2 { background: var(--p2-color); }
    .phase-prog-fill--3 { background: var(--p3-color); }

    .phase-title-h2 {
      font-family: var(--font-heading);
      font-size: clamp(1.75rem, 3.5vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.025em;
      word-break: keep-all;
    }

    /* ============================================================
       CENTER TIMELINE AXIS
       ============================================================ */
    .timeline-axis {
      position: relative;
    }
    .timeline-axis-line {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(79,70,229,0.5) 15%,
        rgba(79,70,229,0.3) 85%,
        transparent 100%
      );
      z-index: 0;
    }
    .phase-block--mid .timeline-axis-line {
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(14,165,233,0.5) 15%,
        rgba(14,165,233,0.3) 85%,
        transparent 100%
      );
    }
    .phase-block--deep .timeline-axis-line {
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(16,185,129,0.5) 15%,
        rgba(16,185,129,0.3) 85%,
        transparent 100%
      );
    }
    .phase-block--light .timeline-axis-line { background: var(--border-light); }

    /* Timeline row: card alternating left/right */
    .timeline-row {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      align-items: center;
      margin-bottom: 40px;
    }
    .timeline-row:last-child { margin-bottom: 0; }

    /* The dot on center axis */
    .timeline-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .timeline-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--dark);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      transition: box-shadow 0.3s ease;
    }
    .phase-block--light .timeline-dot { border-color: var(--light); }
    .phase-block--mid .timeline-dot { border-color: var(--dark-2); }
    .phase-block--deep .timeline-dot { border-color: var(--dark-3); }
    .timeline-dot--done   {
      background: var(--status-done);
      box-shadow: 0 0 0 4px rgba(79,70,229,0.3), 0 0 12px rgba(79,70,229,0.4);
    }
    .timeline-dot--prog   {
      background: var(--gold);
      border-color: rgba(255,183,3,0.5);
      box-shadow: 0 0 0 4px rgba(255,183,3,0.25), 0 0 16px rgba(255,183,3,0.5);
      animation: dotPulseGold 2s ease-in-out infinite;
    }
    .timeline-dot--pend   {
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.35);
    }
    .phase-block--light .timeline-dot--pend { background: #d1d5db; border-color: #9ca3af; }
    .timeline-dot--del    {
      background: var(--status-del);
      box-shadow: 0 0 0 4px rgba(239,68,68,0.25), 0 0 10px rgba(239,68,68,0.3);
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(14,165,233,0.25); }
      50%       { box-shadow: 0 0 0 8px rgba(14,165,233,0.1); }
    }
    @keyframes dotPulseGold {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255,183,3,0.25), 0 0 16px rgba(255,183,3,0.5); }
      50%       { box-shadow: 0 0 0 8px rgba(255,183,3,0.12), 0 0 28px rgba(255,183,3,0.3); }
    }

    /* Connector line from dot to card */
    .timeline-connector {
      position: absolute;
      top: 50%;
      height: 1px;
      z-index: 1;
    }
    .phase-block--light .timeline-connector { background: var(--border-light); }
    .timeline-connector--left  {
      right: 100%; width: 100%;
      background: linear-gradient(to left, rgba(79,70,229,0.5), rgba(255,255,255,0.05));
    }
    .timeline-connector--right {
      left: 100%; width: 100%;
      background: linear-gradient(to right, rgba(79,70,229,0.5), rgba(255,255,255,0.05));
    }
    .phase-block--mid .timeline-connector--left {
      background: linear-gradient(to left, rgba(14,165,233,0.5), rgba(255,255,255,0.05));
    }
    .phase-block--mid .timeline-connector--right {
      background: linear-gradient(to right, rgba(14,165,233,0.5), rgba(255,255,255,0.05));
    }
    .phase-block--deep .timeline-connector--left {
      background: linear-gradient(to left, rgba(16,185,129,0.5), rgba(255,255,255,0.05));
    }
    .phase-block--deep .timeline-connector--right {
      background: linear-gradient(to right, rgba(16,185,129,0.5), rgba(255,255,255,0.05));
    }

    /* Card placement */
    .timeline-card-col--left  { grid-column: 1; display: flex; justify-content: flex-end; }
    .timeline-card-col--right { grid-column: 3; display: flex; justify-content: flex-start; }
    .timeline-card-col--empty { grid-column: 1 or 3; }

    /* ============================================================

MILESTONE CARD
       ============================================================ */
    .milestone-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-md);
      padding: 28px 28px 24px;
      width: calc(100% - 20px);
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
      cursor: default;
      opacity: 1;
      transform: translateY(0);
      position: relative;
      overflow: hidden;
    }
    .milestone-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.07);
    }

    /* Light-background variant */
    .phase-block--light .milestone-card {
      background: var(--white);
      border-color: var(--border-light);
      box-shadow: var(--shadow-sm);
      color: var(--text);
    }
    .phase-block--light .milestone-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: #d1d5db;
      background: var(--white);
    }

    /* Deep-background variant (Phase 3) */
    .phase-block--deep .milestone-card {
      background: rgba(16,185,129,0.04);
      border-color: rgba(16,185,129,0.1);
    }
    .phase-block--deep .milestone-card:hover {
      border-color: rgba(16,185,129,0.2);
      background: rgba(16,185,129,0.07);
    }

    /* Card accent bar */
    .milestone-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }
    .milestone-card--done::before   { background: var(--status-done); }
    .milestone-card--prog::before   { background: linear-gradient(90deg, var(--gold), var(--gold-dim)); }
    .milestone-card--pend::before   { background: rgba(255,255,255,0.1); }
    .phase-block--light .milestone-card--pend::before { background: var(--border-light); }
    .milestone-card--del::before    { background: var(--status-del); }

    /* Card top row */
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-icon-wrap {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
    }

					desc: "모든 주요 마일스톤 완료 및 하반기 전국 확대 계획 확정.",
					status: "pending",
				},
			],
		},
	],
};

/* ─── STATUS HELPERS ──────────────────────────────────────── */
function resolveStatus(milestone) {
	if (milestone.status === "completed") return "done";
	if (milestone.status === "in-progress") return "prog";
	var today = new Date();
	today.setHours(0, 0, 0, 0);
	var d = new Date(milestone.date);
	d.setHours(0, 0, 0, 0);
	if (d < today) return "del";
	return "pend";
}

function statusLabel(s) {
	return (
		{ done: "완료", prog: "진행중", pend: "예정", del: "지연" }[s] || "예정"
	);
}

"use strict";

/* ─── BUILD MILESTONE CARD ────────────────────────────────── */
function buildCard(m, side) {
	var s = resolveStatus(m);
	var article = document.createElement("article");
	article.className = "milestone-card milestone-card--" + s;

	/* icon wrap */
	var top = document.createElement("div");
	top.className = "card-top";

	var iconWrap = document.createElement("div");
	iconWrap.className = "card-icon-wrap card-icon-wrap--" + s;
	iconWrap.textContent = m.icon;

	top.appendChild(iconWrap);
	article.appendChild(top);

	/* id + date */
	var meta = document.createElement("div");
	meta.className = "card-id-date";
	var idText = document.createTextNode(m.id);
	var sep = document.createElement("span");
	sep.className = "card-id-date-sep";
	sep.textContent = "/";
	var dateText = document.createTextNode(m.displayDate);
	meta.appendChild(idText);
	meta.appendChild(sep);
	meta.appendChild(dateText);
	article.appendChild(meta);

	/* title */
	var titleEl = document.createElement("h3");
	titleEl.className = "card-title";
	titleEl.textContent = m.title;
	article.appendChild(titleEl);

	/* desc */
	var descEl = document.createElement("p");
	descEl.className = "card-desc";
	descEl.textContent = m.desc;
	article.appendChild(descEl);

	return article;
}

"use strict";

/* ─── BUILD TIMELINE DOT ──────────────────────────────────── */
function buildDot(s) {
	var col = document.createElement("div");
	col.className = "timeline-dot-col";

	var dot = document.createElement("div");
	dot.className = "timeline-dot timeline-dot--" + s;
	col.appendChild(dot);
	return col;
}

/* ─── BUILD PHASE BLOCK ───────────────────────────────────── */
function buildPhase(phase) {
	var s = document.createElement("section");
	s.className = "phase-block phase-block--" + phase.theme;
	s.id = "phase-" + phase.phaseId;

	var inner = document.createElement("div");
	inner.className = "phase-block-inner";

	/* Phase header */
	var header = document.createElement("div");
	header.className = "phase-header fade-up";

	var numEl = document.createElement("div");
	numEl.className = "phase-num phase-num--" + phase.phaseNum;
	numEl.textContent = "P" + phase.phaseNum;
	header.appendChild(numEl);

	var meta = document.createElement("div");
	meta.className = "phase-meta";

	var tagRow = document.createElement("div");
	tagRow.className = "phase-tag-row";

	var monthTag = document.createElement("span");
	monthTag.className = "phase-month-tag phase-month-tag--" + phase.phaseNum;
	monthTag.textContent = phase.month;
	tagRow.appendChild(monthTag);

	/* Progress line */
	var total = phase.milestones.length;
	var done = phase.milestones.filter(function (m) {
		return m.status === "completed";
	}).length;
	var pct = total > 0 ? Math.round((done / total) * 100) : 0;

	meta.appendChild(tagRow);

	var titleEl = document.createElement("h2");
	titleEl.className = "phase-title-h2";
	titleEl.textContent = phase.title;
	meta.appendChild(titleEl);
	header.appendChild(meta);
	inner.appendChild(header);

	/* Axis */
	var axis = document.createElement("div");
	axis.className = "timeline-axis";

	var axisLine = document.createElement("div");
	axisLine.className = "timeline-axis-line";
	axis.appendChild(axisLine);

	/* Cards */
	phase.milestones.forEach(function (m, idx) {
		var s2 = resolveStatus(m);
		var row = document.createElement("div");
		row.className = "timeline-row";

		var isLeft = idx % 2 === 0;

		/* Left card col */
		var leftCol = document.createElement("div");
		leftCol.className = "timeline-card-col--left";

		/* Center dot col */
		var dotCol = buildDot(s2);

		/* Right card col */
		var rightCol = document.createElement("div");
		rightCol.className = "timeline-card-col--right";

		var card = buildCard(m, isLeft ? "left" : "right");

		if (isLeft) {
			leftCol.appendChild(card);
		} else {
			rightCol.appendChild(card);
		}

		row.appendChild(leftCol);
		row.appendChild(dotCol);
		row.appendChild(rightCol);
		axis.appendChild(row);
	});

	inner.appendChild(axis);
	s.appendChild(inner);
	return s;
}

"use strict";

/* ─── BUILD DASHBOARD ─────────────────────────────────────── */
function buildDashboard(allMilestones) {
	var total = allMilestones.length;
	var done = allMilestones.filter(function (m) {
		return resolveStatus(m) === "done";
	}).length;
	var prog = allMilestones.filter(function (m) {
		return resolveStatus(m) === "prog";
	}).length;
	var pend = allMilestones.filter(function (m) {
		return resolveStatus(m) === "pend";
	}).length;
	var del = allMilestones.filter(function (m) {
		return resolveStatus(m) === "del";
	}).length;
	var pct = total > 0 ? Math.round((done / total) * 100) : 0;

	var section = document.createElement("section");
	section.className = "dashboard-section";
	section.id = "dashboard";

	var inner = document.createElement("div");
	inner.className = "dashboard-inner";

	/* Top */
	var top = document.createElement("div");
	top.className = "dashboard-top fade-up";

	var left = document.createElement("div");
	var label = document.createElement("div");
	label.className = "dashboard-label";
	label.textContent = "Overall Progress";
	var title = document.createElement("h2");
	title.className = "dashboard-title";
	title.textContent = "전체 진행률";
	left.appendChild(label);
	left.appendChild(title);

	var right = document.createElement("div");
	var pctEl = document.createElement("div");
	pctEl.className = "dashboard-overall-pct";
	pctEl.id = "overall-pct-display";
	pctEl.textContent = "0%";
	var pctLbl = document.createElement("div");
	pctLbl.className = "dashboard-pct-label";
	pctLbl.textContent = done + "/" + total + " 마일스톤 완료";
	right.appendChild(pctEl);
	right.appendChild(pctLbl);

	top.appendChild(left);
	top.appendChild(right);
	inner.appendChild(top);

	/* Overall bar */
	var barWrap = document.createElement("div");
	barWrap.className = "overall-progress-wrap fade-up";
	var barFill = document.createElement("div");
	barFill.className = "overall-progress-fill";
	barFill.id = "overall-bar-fill";
	barWrap.appendChild(barFill);
	inner.appendChild(barWrap);

	/* Stats grid */
	var statsGrid = document.createElement("div");
	statsGrid.className = "stats-grid fade-up";

	var statsData = [
		{
			num: done,
			cls: "done",
			label: "완료",
			barPct: total > 0 ? (done / total) * 100 : 0,
		},
		{
			num: prog,
			cls: "prog",
			label: "진행중",
			barPct: total > 0 ? (prog / total) * 100 : 0,
		},
		{
			num: pend,
			cls: "pend",
			label: "예정",
			barPct: total > 0 ? (pend / total) * 100 : 0,
		},
		{
			num: del,
			cls: "del",
			label: "지연",
			barPct: total > 0 ? (del / total) * 100 : 0,
		},
	];

	statsData.forEach(function (sd) {
		var card = document.createElement("div");
		card.className = "stat-card fade-up";

		var num = document.createElement("div");
		num.className = "stat-num stat-num--" + sd.cls;
		num.textContent = sd.num;

		var desc = document.createElement("div");
		desc.className = "stat-desc";
		desc.textContent = sd.label;

		var miniWrap = document.createElement("div");
		miniWrap.className = "stat-bar-mini";
		var miniFill = document.createElement("div");
		miniFill.className = "stat-bar-mini-fill stat-bar-mini-fill--" + sd.cls;
		miniFill.style.width = "0%";
		miniFill.dataset.target = sd.barPct.toFixed(1);
		miniWrap.appendChild(miniFill);

		card.appendChild(num);
		card.appendChild(desc);
		card.appendChild(miniWrap);
		statsGrid.appendChild(card);
	});
	inner.appendChild(statsGrid);

	/* Phase breakdown */
	var breakdown = document.createElement("div");
	breakdown.className = "phase-breakdown";

	ROADMAP.phases.forEach(function (phase) {
		var t = phase.milestones.length;
		var d = phase.milestones.filter(function (m) {
			return m.status === "completed";
		}).length;
		var p = t > 0 ? Math.round((d / t) * 100) : 0;

		var card = document.createElement("div");
		card.className = "phase-breakdown-card fade-up";

		var tag = document.createElement("span");
		tag.className =
			"breakdown-phase-tag breakdown-phase-tag--" + phase.phaseNum;
		tag.textContent = phase.month + " · Phase " + phase.phaseNum;

		var bdTitle = document.createElement("div");
		bdTitle.className = "breakdown-title";
		bdTitle.textContent = phase.title;

		var bdTrack = document.createElement("div");
		bdTrack.className = "breakdown-track";
		var bdFill = document.createElement("div");
		bdFill.className = "breakdown-fill breakdown-fill--" + phase.phaseNum;
		bdFill.style.width = p + "%";
		bdTrack.appendChild(bdFill);

		var bdBottom = document.createElement("div");
		var bdPct = document.createElement("span");
		bdPct.className = "breakdown-pct";
		bdPct.textContent = p + "%";
		var bdCount = document.createElement("span");
		bdCount.className = "breakdown-count";
		bdCount.textContent = d + "/" + t;
		bdBottom.appendChild(bdPct);
		bdBottom.appendChild(bdCount);

		card.appendChild(tag);
		card.appendChild(bdTitle);
		card.appendChild(bdTrack);
		card.appendChild(bdBottom);
		breakdown.appendChild(card);
	});
	inner.appendChild(breakdown);
	section.appendChild(inner);

	/* Animate bars after render */
	setTimeout(function () {
		document.getElementById("overall-bar-fill").style.width = pct + "%";
		document.getElementById("overall-pct-display").textContent = pct + "%";
		document.querySelectorAll(".stat-bar-mini-fill").forEach(function (el) {
			el.style.width = el.dataset.target + "%";
		});
	}, 400);

	return section;
}

"use strict";

/* ─── HERO STATS ──────────────────────────────────────────── */
function updateHeroStats(allMilestones) {
	var done = allMilestones.filter(function (m) {
		return resolveStatus(m) === "done";
	}).length;
	var prog = allMilestones.filter(function (m) {
		return resolveStatus(m) === "prog";
	}).length;
	var total = allMilestones.length;
}

"use strict";

/* ─── SCROLL PROGRESS BAR ─────────────────────────────────── */
function initScrollBar() {
	var bar = document.getElementById("scroll-progress-bar");
	if (!bar) return;
	window.addEventListener(
		"scroll",
		function () {
			var total =
				document.documentElement.scrollHeight -
				document.documentElement.clientHeight;
			bar.style.width = (total > 0 ? (window.scrollY / total) * 100 : 0) + "%";
		},
		{ passive: true },
	);
}

/* ─── INTERSECTION OBSERVER ───────────────────────────────── */
function initScrollAnimations() {
	var els = document.querySelectorAll(".milestone-card, .fade-up");

	if (!window.IntersectionObserver) {
		els.forEach(function (el) {
			el.classList.add("is-visible");
		});
		return;
	}

	var observer = new IntersectionObserver(
		function (entries) {
			entries.forEach(function (entry) {
				if (entry.isIntersecting) {
					entry.target.classList.add("is-visible");
					observer.unobserve(entry.target);
				}
			});
		},
		{ threshold: 0.08, rootMargin: "0px 0px -30px 0px" },
	);

	els.forEach(function (el) {
		observer.observe(el);
	});
}

/* ─── NAV PILL CLICK + SCROLL TRACKING ───────────────────── */
function initNavPills() {
	var pills = document.querySelectorAll(".nav-pill[data-target]");
	var isClicking = false;

	/* Click → smooth scroll */
	pills.forEach(function (pill) {
		pill.style.cursor = "pointer";
		pill.addEventListener("click", function (e) {
			e.preventDefault();
			isClicking = true;
			var target = document.getElementById(pill.getAttribute("data-target"));
			if (target) target.scrollIntoView({ behavior: "smooth" });
			pills.forEach(function (p) { p.classList.remove("nav-pill--active"); });
			pill.classList.add("nav-pill--active");
			setTimeout(function () { isClicking = false; }, 800);
		});
	});

	/* Scroll → auto-activate matching pill */
	if (!window.IntersectionObserver) return;
	var sections = [];
	pills.forEach(function (pill) {
		var el = document.getElementById(pill.getAttribute("data-target"));
		if (el) sections.push({ el: el, pill: pill });
	});

	var phaseObserver = new IntersectionObserver(
		function (entries) {
			if (isClicking) return;
			entries.forEach(function (entry) {
				if (entry.isIntersecting) {
					pills.forEach(function (p) { p.classList.remove("nav-pill--active"); });
					for (var i = 0; i < sections.length; i++) {
						if (sections[i].el === entry.target) {
							sections[i].pill.classList.add("nav-pill--active");
							break;
						}
					}
				}
			});
		},
		{ threshold: 0.3 }
	);

	sections.forEach(function (s) { phaseObserver.observe(s.el); });
}

/* ─── BOOT ────────────────────────────────────────────────── */
function boot() {
	var timelineContainer = document.getElementById("timeline-container");
	/* Collect all milestones */
	var allMilestones = [];
	ROADMAP.phases.forEach(function (p) {
		p.milestones.forEach(function (m) {
			allMilestones.push(m);
		});
	});

	/* Update hero stats */
	updateHeroStats(allMilestones);

	/* Render timeline phases */
	if (timelineContainer) {
		ROADMAP.phases.forEach(function (phase) {
			timelineContainer.appendChild(buildPhase(phase));
		});
	}

	/* Init interactions */
	initScrollAnimations();
	initScrollBar();
	initNavPills();

	console.log(
		"LongRun 초기화 완료 — phases: 3, milestones: " + allMilestones.length,
	);
}

if (document.readyState === "loading") {
	document.addEventListener("DOMContentLoaded", boot);
} else {
	boot();
}
