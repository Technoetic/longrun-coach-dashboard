<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LongRun | 2026 상반기 로드맵</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <div id="scroll-progress-bar"></div>

  <!-- HEADER -->
  <header class="header" id="main-header">
    <div class="header-container">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        LongRun
      </div>
      <nav class="header-nav">
        <a class="nav-pill nav-pill--active" data-target="phase-P1">3월 Phase</a>
        <a class="nav-pill" data-target="phase-P2">4월 Phase</a>
        <a class="nav-pill" data-target="phase-P3">5월 Phase</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-orb hero-orb--1"></div>
    <div class="hero-orb hero-orb--2"></div>
    <div class="hero-orb hero-orb--3"></div>
    <div class="hero-grid"></div>

    <div class="hero-content">
      <div class="hero-eyebrow">
        <span class="hero-eyebrow-dot"></span>
        2026 상반기
      </div>
      <h1 class="hero-title">
        LongRun<br>
        <span class="hero-title-accent">로드맵</span>
      </h1>
      <p class="hero-subtitle">
        3단계 · 15개 마일스톤 — MVP 완성부터 국가대표 세일즈까지,<br>
        스포츠 AI 플랫폼의 상반기 실행 계획
      </p>

      <div class="hero-stats" id="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-num hero-stat-num--done" id="hero-stat-done">0</span>
          <span class="hero-stat-label">완료<br>마일스톤</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-num hero-stat-num--prog" id="hero-stat-prog">0</span>
          <span class="hero-stat-label">진행중<br>마일스톤</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-num" id="hero-stat-total" style="color:rgba(255,255,255,0.7)">15</span>
          <span class="hero-stat-label">전체<br>마일스톤</span>
        </div>
      </div>
    </div>

    <div class="scroll-indicator">
      <span>Scroll</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- TIMELINE (JS-rendered) -->
  <div id="timeline-container"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-left">
        <div class="footer-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </div>
          LongRun
        </div>
        <p class="footer-tagline">&copy; 2026 LongRun. 스포츠 AI 플랫폼.</p>
      </div>
      <div class="footer-right">
        <a href="#hero" class="footer-link">상단으로</a>
        <a href="#phase-P1" class="footer-link">로드맵</a>
      </div>
    </div>
  </footer>

  <!-- APPLICATION SCRIPTS -->
  <script src="js/DataStore.js"></script>
  <script src="js/MilestoneCard.js"></script>
  <script src="js/Phase.js"></script>
  <script src="js/ProgressTracker.js"></script>
  <script src="js/Timeline.js"></script>
  <script src="js/App.js"></script>
</body>
</html>
