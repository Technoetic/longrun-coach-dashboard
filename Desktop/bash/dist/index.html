<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeapViz - 힙 자료구조 튜토리얼</title>
  <script type="module" crossorigin src="/assets/index-FgZrT3oV.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BTInTm-x.css">
</head>
<body>
  <!-- Header (54px) -->
  <header class="app-header">
    <h1 class="logo">🏔️ HeapViz</h1>
    <div class="header-controls">
      <select id="scenario-select" class="scenario-select" aria-label="시나리오 선택">
        <option value="hospital">🏥 응급실</option>
        <option value="taxi">🚕 택시 배차</option>
        <option value="number">🔢 숫자</option>
      </select>
      <div class="heap-type-toggle">
        <span class="toggle-label">Min</span>
        <label class="toggle-switch">
          <input type="checkbox" id="heap-type" checked aria-label="힙 타입 전환 (Min/Max)">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Max</span>
      </div>
      <button type="button" id="btn-tutorial" class="btn-header">📖 개념 배우기</button>
    </div>
  </header>

  <!-- App Layout -->
  <div class="app-layout">
    <!-- Sidebar (220px) -->
    <aside class="sidebar">
      <div class="controls-section">
        <h3 class="section-title">연산</h3>
        <div class="input-group">
          <input type="number" id="value-input" placeholder="우선순위 숫자" min="1" max="999">
          <button type="button" id="btn-insert" class="btn-primary" title="새 값을 힙에 넣습니다">넣기</button>
        </div>
        <button type="button" id="btn-extract" class="btn-action" title="가장 위에 있는 값을 꺼냅니다">꺼내기 (루트 추출)</button>
        <button type="button" id="btn-peek" class="btn-action" title="꺼내지 않고 맨 위 값만 확인합니다">엿보기 (루트 확인)</button>
        <div class="divider"></div>
        <button type="button" id="btn-build" class="btn-action" title="랜덤 숫자로 힙을 한번에 만듭니다">랜덤 생성</button>
        <button type="button" id="btn-sort" class="btn-action" title="힙을 이용해 정렬합니다">정렬하기</button>
        <div class="divider"></div>
        <button type="button" id="btn-sample" class="btn-secondary" title="예제 데이터를 넣어봅니다">예제 데이터</button>
        <button type="button" id="btn-clear" class="btn-secondary">초기화</button>
      </div>

      <div class="info-section">
        <h3 class="section-title">정보</h3>
        <div class="info-row"><span>크기:</span><span id="heap-size">0</span></div>
        <div class="info-row"><span>높이:</span><span id="heap-height">0</span></div>
        <div class="info-row"><span>타입:</span><span id="heap-type-display">Max Heap</span></div>
      </div>

      <div class="speed-section">
        <h3 class="section-title">속도</h3>
        <input type="range" id="speed-slider" min="1" max="10" value="5" class="speed-slider" aria-label="애니메이션 속도 조절">
        <div class="speed-labels"><span>느림</span><span>빠름</span></div>
      </div>
    </aside>

    <!-- Main Area -->
    <div class="main-area">
      <canvas id="tree-canvas" class="tree-view"></canvas>
      <div class="array-view" id="array-view"></div>
      <div class="explanation-panel" id="explanation-panel">
        <p>👈 왼쪽에서 <strong>"예제 데이터"</strong>를 눌러 시작하거나, 숫자를 직접 넣어보세요!</p>
      </div>
      <div class="playback-bar">
        <button type="button" id="btn-skip-back" class="btn-playback" title="처음으로">⏮</button>
        <button type="button" id="btn-step-back" class="btn-playback" title="이전 단계">◀</button>
        <button type="button" id="btn-play-pause" class="btn-playback btn-play" title="재생/일시정지">⏸</button>
        <button type="button" id="btn-step-forward" class="btn-playback" title="다음 단계">▶</button>
        <button type="button" id="btn-skip-forward" class="btn-playback" title="끝으로">⏭</button>
        <span class="step-counter" id="step-counter">Step 0/0</span>
      </div>
    </div>
  </div>

  <!-- Welcome Modal -->
  <div class="welcome-modal" id="welcome-modal">
    <div class="modal-content">
      <h2>🏔️ HeapViz에 오신 것을 환영합니다!</h2>
      <p class="modal-analogy">🏥 <strong>병원 응급실</strong>을 생각해보세요.<br>환자가 도착한 순서가 아니라 <strong>위급한 순서</strong>로 치료하죠?</p>
      <p class="modal-analogy">📱 <strong>카카오택시</strong>도 마찬가지 — 가장 가까운 기사가 먼저 배정됩니다.<br>이처럼 <strong>"가장 중요한 것을 빠르게 꺼내는"</strong> 구조가 바로 <strong>힙(Heap)</strong>입니다.</p>
      <p class="modal-hint">왼쪽 버튼을 눌러 직접 체험해보세요!</p>
      <button type="button" id="modal-close" class="btn-primary btn-large">체험 시작하기</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</body>
</html>
