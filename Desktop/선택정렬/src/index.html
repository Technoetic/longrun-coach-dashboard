<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선택정렬 튜토리얼 | Selection Sort Visualizer</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/visualizer.css">
  <link rel="stylesheet" href="./css/animations.css">
</head>
<body>
  <!-- Header: full-width bar, title left, stats right -->
  <header class="app-header">
    <h1 class="app-logo">선택정렬 <span>Selection Sort</span></h1>
    <div class="header-stats">
      <span class="hstat" id="stat-comparisons">비교 <strong>0</strong></span>
      <span class="hstat-divider"></span>
      <span class="hstat" id="stat-swaps">교환 <strong>0</strong></span>
      <span class="hstat-divider"></span>
      <span class="hstat" id="stat-step">단계 <strong>0/0</strong></span>
    </div>
  </header>

  <!-- Main: grid 280px left panel + canvas right -->
  <div class="main-container">
    <!-- Left Panel -->
    <aside class="left-panel" id="left-panel">
      <!-- Step description card -->
      <div class="panel-card" id="description-card">
        <div class="panel-card-header">
          <span class="panel-card-title">실행 설명</span>
          <span class="step-badge" id="step-badge">Step 0 / 0</span>
        </div>
        <div class="panel-card-body">
          <p class="step-description" id="technical-msg">시작 버튼을 눌러주세요</p>
          <p class="step-analogy" id="analogy-msg">📋 학생들의 점수를 정렬하는 과정을 시각적으로 확인해보세요!</p>
          <div class="stats-row">
            <div class="stat-item">
              <span class="stat-label">비교</span>
              <span class="stat-value comparing" id="stat-compare-val">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">교환</span>
              <span class="stat-value swapping" id="stat-swap-val">0</span>
            </div>
          </div>
          <div class="complexity-hint">
            💡 시간복잡도: O(n²) &nbsp;|&nbsp; 공간복잡도: O(1)
          </div>
        </div>
      </div>

      <!-- Code panel card -->
      <div class="panel-card" id="code-card">
        <div class="panel-card-header">
          <span class="panel-card-title">의사코드</span>
        </div>
        <div class="panel-card-body panel-card-body--code">
          <pre class="code-panel" id="code-panel"><code id="pseudocode"></code></pre>
        </div>
      </div>
    </aside>

    <!-- Right: canvas area fills remaining space -->
    <div class="canvas-area" id="canvas-area">
      <div class="visualizer-wrapper">
        <!-- Canvas fills available height -->
        <canvas id="sort-canvas"></canvas>

        <!-- Legend with color dots -->
        <div class="legend">
          <span class="legend-item">
            <span class="legend-dot default"></span>기본
          </span>
          <span class="legend-item">
            <span class="legend-dot comparing"></span>비교 중
          </span>
          <span class="legend-item">
            <span class="legend-dot minimum"></span>최솟값
          </span>
          <span class="legend-item">
            <span class="legend-dot current"></span>교환
          </span>
          <span class="legend-item">
            <span class="legend-dot sorted"></span>정렬 완료
          </span>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-wrapper">
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
          <span class="progress-label" id="progress-label">0%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls Footer: full-width row -->
  <footer class="controls-footer">
    <!-- Row 1: playback + speed + array size -->
    <div class="control-row">
      <!-- Playback controls group -->
      <span class="control-group-label">재생</span>
      <div class="playback-controls">
        <button class="btn btn-secondary" id="btn-first" title="처음으로" aria-label="처음으로">⏮</button>
        <button class="btn btn-secondary" id="btn-prev" title="이전 단계" aria-label="이전 단계">◀</button>
        <button class="btn btn-primary pulse-guide" id="btn-play" title="재생/일시정지" aria-label="재생">▶</button>
        <button class="btn btn-secondary" id="btn-next" title="다음 단계" aria-label="다음 단계">▶</button>
        <button class="btn btn-secondary" id="btn-last" title="끝으로" aria-label="끝으로">⏭</button>
      </div>

      <!-- Speed group -->
      <span class="control-group-label">속도</span>
      <div class="speed-control">
        <input type="range" id="speed-slider" min="0" max="5" value="3" class="speed-slider" aria-label="재생 속도">
        <span class="speed-value" id="speed-value">1.0x</span>
      </div>

      <!-- Array size group -->
      <span class="control-group-label">배열 크기</span>
      <div class="array-size-group">
        <button class="btn btn-size" data-size="10" id="size-10">10</button>
        <button class="btn btn-size active" data-size="20" id="size-20">20</button>
        <button class="btn btn-size" data-size="50" id="size-50">50</button>
        <button class="btn btn-secondary" id="btn-new" title="새 배열 생성" aria-label="새 배열 생성">새로 생성</button>
      </div>
    </div>
  </footer>

  <!-- Mobile: code panel accordion toggle -->
  <div class="mobile-code-toggle" id="mobile-code-toggle" aria-expanded="false">
    <span>코드 패널</span> <span class="toggle-arrow">▼</span>
  </div>
  <div class="mobile-code-panel" id="mobile-code-panel" hidden>
    <pre class="code-panel" id="pseudocode-mobile"><code id="pseudocode-mobile-code"></code></pre>
  </div>

  <script type="module" src="./js/App.js"></script>
</body>
</html>
