<!-- =====================================================
     hero.html — 히어로 섹션 컴포넌트
     빌드 시 html-bundler.ps1이 index.html에 인라인화
     ===================================================== -->
<section id="hero" class="hero-section" aria-label="히어로 영역">
  <canvas id="hero-canvas" class="hero__canvas" aria-hidden="true"></canvas>
  <div class="hero__overlay">
    <h1 class="hero__title">
      지도 앱은 어떻게<br>
      <span class="hero__title-accent">최단 경로</span>를 찾을까?
    </h1>
    <p class="hero__subtitle">
      BFS(너비 우선 탐색)의 원리를 인터랙티브하게 배우세요
    </p>
    <a href="#bfs-explorer" class="btn btn-hero hero__cta">시각화 시작하기</a>
  </div>
  <div class="hero__animation-indicator" aria-hidden="true">자동 재생 중... ▶</div>
  <div class="hero__scroll-hint" aria-hidden="true">
    <span class="hero__scroll-text">스크롤하여 시작</span>
    <span class="hero__scroll-arrow">↓</span>
  </div>
</section>
